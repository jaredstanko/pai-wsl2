# /etc/wsl.conf — WSL2 distro configuration for PAI
# Copied into the distro during install.ps1 Step 5.
#
# SANDBOX MODEL: automount and interop are DISABLED by default.
# The AI cannot see C:\ or run Windows executables.
# Only specific workspace directories are mounted via /etc/fstab.
#
# On Windows 10 (no WSLg), the user may opt in to interop for audio.
# install.ps1 writes a separate wsl-interop.conf if they choose that.

[user]
default = claude

[boot]
systemd = true

[automount]
enabled = false
mountFsTab = true

[interop]
enabled = false
appendWindowsPath = false

[network]
generateHosts = true
generateResolvConf = true
