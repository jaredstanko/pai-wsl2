# /etc/wsl.conf — WSL2 distro configuration for PAI
# Copied into the distro during install.ps1 Step 5.

[user]
default = claude

[boot]
systemd = true

[automount]
enabled = true
root = /mnt/
options = "metadata,umask=22,fmask=11"

[interop]
enabled = true
appendWindowsPath = true

[network]
generateHosts = true
generateResolvConf = true
